<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct Messages - PulseNet</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 1.5rem;
      height: calc(100vh - 120px);
      max-width: 1100px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }
    .chat-sidebar {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .chat-sidebar-header {
      padding: 1.2rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 1.1rem;
      font-weight: 700;
    }
    .chat-conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
    }
    .chat-conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition-fast);
      margin-bottom: 6px;
    }
    .chat-conv-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }
    .chat-conv-item.active {
      background: rgba(168, 85, 247, 0.18);
      border: 1px solid var(--accent-color);
    }
    .chat-conv-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
    }
    .chat-conv-info {
      flex: 1;
      overflow: hidden;
    }
    .chat-conv-name {
      font-weight: 700;
      font-size: 0.92rem;
    }
    .chat-conv-preview {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-main {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-bubble-row {
      display: flex;
      width: 100%;
    }
    .chat-bubble-row.mine {
      justify-content: flex-end;
    }
    .chat-bubble-row.theirs {
      justify-content: flex-start;
    }
    .chat-bubble {
      max-width: 65%;
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .chat-bubble-row.mine .chat-bubble {
      background: var(--primary-gradient);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble-row.theirs .chat-bubble {
      background: var(--bg-input);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 4px;
    }
    .chat-time {
      font-size: 0.7rem;
      opacity: 0.75;
      margin-top: 4px;
      text-align: right;
    }
    .chat-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
    }
    @media (max-width: 768px) {
      .messages-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="/feed.html" class="nav-brand">
      ⚡ <span>PulseNet</span>
    </a>

    <div class="nav-actions">
      <a href="/feed.html" class="icon-btn" title="Home Feed">🏠</a>
      <a href="/messages" class="icon-btn" title="Direct Messages" style="background: var(--accent-color); color: #fff;">💬</a>
      <a href="/profile.html" title="View Profile">
        <img src="/uploads/default-avatar.svg" id="nav-user-avatar" class="user-avatar-btn" alt="Profile">
      </a>
      <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
      <button class="icon-btn" id="logout-btn" title="Logout">🚪</button>
    </div>
  </nav>

  <!-- Messages 2-Column Layout -->
  <div class="messages-layout">
    <!-- Left Column: Conversations Sidebar -->
    <div class="glass-card chat-sidebar">
      <div class="chat-sidebar-header">
        💬 Direct Messages
      </div>
      <div class="chat-conv-list" id="conversations-list">
        <!-- Rendered via messages.js -->
      </div>
    </div>

    <!-- Right Column: Active Chat Thread -->
    <div class="glass-card chat-main">
      <div class="chat-header">
        <img src="/uploads/default-avatar.svg" id="chat-header-avatar" class="chat-header-avatar">
        <div>
          <div id="chat-header-name" style="font-weight: 700; font-size: 1rem;">Select a Conversation</div>
        </div>
      </div>

      <div class="chat-thread" id="chat-thread-container">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <h3>Your Messages</h3>
          <p>Select a chat from the left sidebar to start messaging.</p>
        </div>
      </div>

      <!-- Chat Input Area Form (Always Visible) -->
      <form id="chat-message-form" class="chat-footer">
        <input type="text" id="chat-message-input" class="form-control" placeholder="Write a message..." required autocomplete="off">
        <button type="submit" class="btn-primary">Send</button>
      </form>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/messages.js"></script>
</body>
</html>
