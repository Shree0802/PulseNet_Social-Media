<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Page Not Found - PulseNet</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div style="display: flex; min-height: 100vh; align-items: center; justify-content: center; text-align: center; padding: 2rem;">
    <div class="glass-card" style="padding: 3rem; max-width: 500px; width: 100%; animation: fadeIn 0.4s ease;">
      <div style="font-size: 4rem; margin-bottom: 0.5rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700;">
        404
      </div>
      <h2 style="font-size: 1.5rem; margin-bottom: 0.8rem;">Page Not Found</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">
        The page or post you are looking for doesn't exist or has been moved.
      </p>
      <a href="/feed.html" class="btn-primary">
        🏠 Back to Feed
      </a>
    </div>
  </div>
  <script src="/js/theme.js"></script>
</body>
</html>
